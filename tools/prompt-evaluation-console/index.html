<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt Evaluation Console</title>
  <style>
    :root { --ink:#162235; --muted:#62748a; --bg:#f6f9ff; --card:#fff; --line:#d8e2ef; --accent:#0f6ab4; --ok:#127f52; --bad:#af3b1a; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"IBM Plex Sans","Avenir Next","Segoe UI",sans-serif; color:var(--ink); background:linear-gradient(180deg,#eef5ff,#f8fcff); }
    .wrap { max-width:1100px; margin:0 auto; padding:22px; }
    h1 { margin:0; font-size:30px; }
    .sub { margin:8px 0 18px; color:var(--muted); font-size:14px; }
    .grid { display:grid; gap:12px; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; box-shadow:0 8px 18px rgba(12,32,58,.05); }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; font-weight:600; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:8px; padding:8px 10px; font:inherit; }
    textarea { min-height:120px; font-family:Menlo,Consolas,monospace; font-size:12px; }
    button { border:1px solid var(--accent); background:var(--accent); color:#fff; padding:10px 12px; border-radius:9px; font-weight:650; cursor:pointer; }
    button.alt { background:#fff; color:var(--ink); border-color:var(--line); }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th, td { border-bottom:1px solid var(--line); padding:7px 8px; text-align:right; }
    th:first-child, td:first-child { text-align:left; }
    .pill { display:inline-block; font-size:11px; padding:2px 7px; border-radius:999px; border:1px solid #d0dcec; background:#f4f8ff; margin-right:6px; }
    .good { color:var(--ok); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    .row > * { flex:1 1 150px; }
    .mono { font-family:Menlo,Consolas,monospace; font-size:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Prompt Evaluation Console</h1>
    <div class="sub">Control gate for AI-generated risk outputs before distribution. <span class="pill">AS-OF: 2026-03-05 14:03:09 EST</span> <a href="../index.html">Back to suite</a></div>
    
<div class="grid">
  <div class="card">
    <label>Paste AI output for evaluation</label>
    <textarea id="txt">Decision Summary:
...
Recommended Actions (Owner, Due Date):
...
Sources:
- https://www.bis.org/bcbs/publ/d457.htm</textarea>
    <div class="row" style="margin-top:8px"><button onclick="score()">Run Quality Gate</button></div>
  </div>
  <div class="card" id="score"></div>
</div>
<div class="card" style="margin-top:12px" id="checks"></div>
<script>
function score(){
  const t=document.getElementById('txt').value;
  const checks=[
    ['Decision Summary', /decision summary/i.test(t)],
    ['Quant or evidence section', /(quant|evidence)/i.test(t)],
    ['Recommended actions with owner', /(owner)/i.test(t)],
    ['Due date present', /(?:due date|\\b20\\d{2}-\\d{2}-\\d{2}\\b)/i.test(t)],
    ['Escalation trigger', /(escalation|trigger)/i.test(t)],
    ['Source URL present', /https?:\/\//i.test(t)],
    ['Unconfirmed protocol handled', !/unconfirmed/i.test(t) || /verification/i.test(t)],
  ];
  const pass=checks.filter(c=>c[1]).length;
  const pct=pass/checks.length*100;
  const grade = pct>=90 ? 'GREEN' : (pct>=70 ? 'AMBER' : 'RED');
  document.getElementById('score').innerHTML = `<h3 style='margin-top:0'>Evaluation score</h3><div class='${grade==='GREEN'?'good':'bad'}' style='font-size:28px'>${pct.toFixed(0)}% (${grade})</div><div>Passed ${pass}/${checks.length} controls</div>`;
  document.getElementById('checks').innerHTML='<table><thead><tr><th>Control</th><th>Status</th></tr></thead><tbody>'+
    checks.map(c=>`<tr><td>${c[0]}</td><td class='${c[1]?'good':'bad'}'>${c[1]?'PASS':'FAIL'}</td></tr>`).join('')+
    '</tbody></table>';
}
score();
</script>

  </div>
</body>
</html>
